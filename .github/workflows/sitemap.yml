name: Generate sitemap

on:
  push:
    branches:
      - main

jobs:
  sitemap_job:
    runs-on: ubuntu-latest
    name: Generate a sitemap
    # 👇 This line gives the bot permission to push changes back to your repo
    permissions:
      contents: write
      
    steps:
    - name: Checkout the code
      uses: actions/checkout@v3

    - name: Generate Sitemap
      uses: cicirello/generate-sitemap@v1
      with:
        base-url-path: https://wheelquiz.com/

    - name: Commit and push if changed
      run: |
        git config --global user.name 'Sitemap Bot'
        git config --global user.email 'bot@wheelquiz.com'
        git add sitemap.xml
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated sitemap update [skip ci]" && git push)
